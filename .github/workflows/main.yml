name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download and Run exactly Gradle 8.3
      run: |
        wget https://services.gradle.org/distributions/gradle-8.3-bin.zip -q
        unzip -q gradle-8.3-bin.zip
        ./gradle-8.3/bin/gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CrackMeasureApp-APK
        path: app/build/outputs/apk/debug/app-debug.apk
